<div class="container-fluid py-2">
  <div class="card shadow-sm border-0 rounded-4 p-4">
    
    <!-- Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
      <h3 class="fw-bold mb-0 text-body">Transactions</h3>
      
      <div class="search-box position-relative" style="width: 250px;">
        <i class="bi bi-search position-absolute text-secondary" style="left: 12px; top: 10px;"></i>
        <input type="text" 
               class="form-control rounded-pill ps-5 bg-body-tertiary border-0" 
               placeholder="Search..."
               (input)="onSearch($event)">
      </div>
    </div>

    <!-- Filters -->
    <div class="d-flex flex-wrap align-items-center gap-3 mb-4">
       <div class="btn-group shadow-sm">
          <button class="btn fw-medium px-4" 
                  [class.btn-primary]="activeFilter === 'All'" 
                  [class.btn-light]="activeFilter !== 'All'"
                  (click)="setFilter('All')">All</button>
          <button class="btn fw-medium px-3" 
                  [class.btn-primary]="activeFilter === 'Income'" 
                  [class.btn-light]="activeFilter !== 'Income'"
                  (click)="setFilter('Income')">Income</button>
          <button class="btn fw-medium px-3" 
                  [class.btn-primary]="activeFilter === 'Expense'" 
                  [class.btn-light]="activeFilter !== 'Expense'"
                  (click)="setFilter('Expense')">Expense</button>
       </div>
       
       <button class="btn btn-light shadow-sm fw-medium d-flex align-items-center gap-2">
         Date <i class="bi bi-chevron-down small"></i>
       </button>
       <button class="btn btn-light shadow-sm fw-medium d-flex align-items-center gap-2">
         Category <i class="bi bi-chevron-down small"></i>
       </button>
    </div>

    <!-- Table -->
    <div class="table-responsive">
      <table class="table table-borderless table-hover align-middle mb-0">
        <thead class="text-body-secondary small">
          <tr class="border-bottom">
            <th class="fw-medium pb-3 px-3">Date</th>
            <th class="fw-medium pb-3">Category</th>
            <th class="fw-medium pb-3">Description</th>
            <th class="fw-medium pb-3">Amount</th>
            <th class="fw-medium pb-3 text-center">Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
             <td colspan="5" class="text-center py-5">
               <div class="spinner-border text-primary"></div>
             </td>
          </tr>
          <tr *ngIf="!loading && filteredTransactions.length === 0">
             <td colspan="5" class="text-center py-5 text-secondary">
               No transactions found.
             </td>
          </tr>
          
          <tr *ngFor="let tx of filteredTransactions" class="border-bottom">
            <td class="text-body fw-medium px-3 py-3" style="font-size: 0.95rem;">
              {{ tx.date | date:'dd MMM yyyy' }}
            </td>
            <td>
              <div class="d-flex align-items-center gap-2 text-body fw-bold" style="font-size: 0.95rem;">
                 <!-- Icon dynamically based on category -->
                 <i class="bi shadow-sm rounded p-1" 
                    [ngClass]="{
                      'bi-basket text-success bg-success-subtle': tx.category === 'Grocery' || tx.category === 'Food & Dining',
                      'bi-credit-card text-info bg-info-subtle': tx.category === 'Salary' || tx.type === 'INCOME',
                      'bi-cup-hot text-danger bg-danger-subtle': tx.category === 'Dining' || tx.category === 'Travel',
                      'bi-briefcase text-warning bg-warning-subtle': tx.category === 'Shopping' || tx.category === 'Bills',
                      'bi-lightning-charge text-primary bg-primary-subtle': tx.category === 'Utilities'
                    }"
                    style="font-size: 1.1rem;"></i>
                 {{ tx.category }}
              </div>
            </td>
            <td class="text-body-secondary fw-medium" style="font-size: 0.95rem;">
              {{ tx.description || 'N/A' }}
            </td>
            <td class="fw-bold" style="font-size: 1.05rem;"
                [ngClass]="tx.type === 'INCOME' ? 'text-success' : 'text-danger-emphasis'">
              {{ tx.type === 'INCOME' ? '+' : '-' }}&#8377;{{ tx.amount | number:'1.0-0' }}
            </td>
            <td class="text-center">
              <span class="badge rounded-pill px-3 py-2 fw-medium border shadow-sm"
                    [ngClass]="getStatus(tx.date) === 'Pending' ? 'text-warning-emphasis bg-warning-subtle border-warning-subtle' : 'text-success-emphasis bg-success-subtle border-success-subtle'"
                    style="font-size: 0.85rem;">
                {{ getStatus(tx.date) }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
